{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-gray-800 p-8 rounded-2xl border border-gray-700 mt-10">
    <h2 class="text-3xl font-bold mb-2 text-blue-400">Sign Up</h2>
    <p class="text-gray-400 mb-6">Create an account for DriveDirect.</p>
    
    <form action="/register" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm mb-1 text-gray-300">Email Address</label>
            <input type="email" name="email" required placeholder="name@example.com" 
                   class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 focus:border-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-sm mb-1 text-gray-300">Phone Number</label>
            <input type="text" name="phone" required placeholder="Enter mobile number" 
                   class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 focus:border-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-sm mb-1 text-gray-300">Password</label>
            <input type="password" name="password" required placeholder="••••••••" 
                   class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 focus:border-blue-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-bold transition mt-4">
            Send OTP
        </button>
    </form>
</div>
{% endblock %}
