{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto py-10">
    <div class="bg-gray-800 p-8 rounded-2xl border border-gray-700 shadow-2xl">
        <h2 class="text-3xl font-bold text-red-400 mb-2">Report an Issue</h2>
        <p class="text-gray-400 mb-6">Filing a complaint for Booking <span class="text-white font-mono">#{{ booking_id }}</span></p>

        <form action="/report/{{ booking_id }}" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Subject</label>
                <select name="subject" class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 text-white outline-none focus:border-red-500">
                    <option value="Driver Behavior">Driver Behavior</option>
                    <option value="Vehicle Condition">Vehicle Condition</option>
                    <option value="Pricing Issue">Pricing/Fare Issue</option>
                    <option value="App Glitch">App/Technical Issue</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-2">Detailed Description</label>
                <textarea name="description" rows="5" required placeholder="Please describe what happened..." 
                          class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 text-white outline-none focus:border-red-500"></textarea>
            </div>
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 p-4 rounded-xl font-bold text-white transition">
                Submit Complaint
            </button>
            <a href="/my-bookings" class="block text-center text-gray-500 hover:text-white text-sm">Cancel and go back</a>
        </form>
    </div>
</div>
{% endblock %}
