{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto text-center py-20">
    <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-green-500/20">
        <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
    </div>
    <h2 class="text-4xl font-bold mb-2">Booking Confirmed!</h2>
    <p class="text-gray-400 mb-8">Your ride is scheduled. Please share the OTP below with the driver to start the journey.</p>
    
    <div class="bg-gray-800 p-8 rounded-2xl border-2 border-dashed border-gray-600 mb-8">
        <p class="text-gray-500 uppercase text-sm tracking-widest mb-2">Your Ride OTP</p>
        <h1 class="text-6xl font-mono font-black text-white tracking-tighter">{{ otp }}</h1>
    </div>

    <div class="text-2xl font-bold text-blue-400 mb-8">
        Total Fare: ${{ price }}
    </div>

    <a href="/" class="text-gray-400 hover:text-white underline">Return to Home</a>
</div>
{% endblock %}
