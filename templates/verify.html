{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-gray-800 p-8 rounded-2xl border border-gray-700 mt-10 text-center">
    <h2 class="text-3xl font-bold mb-2 text-green-400">Verify OTP</h2>
    <p class="text-gray-400 mb-6">Check your <b>VS Code Terminal</b> for the 6-digit code.</p>
    
    <form action="/verify" method="POST" class="space-y-6">
        <div>
            <label class="block text-sm mb-1 text-gray-300">Enter Code</label>
            <input type="text" name="otp" required placeholder="000000" maxlength="6"
                   class="w-full p-4 rounded-lg bg-gray-900 border border-gray-700 focus:border-green-500 outline-none text-center text-3xl tracking-widest font-mono text-white">
        </div>
        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 p-3 rounded-lg font-bold transition">
            Verify & Create Account
        </button>
    </form>
</div>
{% endblock %}
